services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@db:5432/pm_trader?schema=public}
      POLYMARKET_GAMMA_HOST: ${POLYMARKET_GAMMA_HOST:-https://gamma-api.polymarket.com}
      POLYMARKET_DATA_HOST: ${POLYMARKET_DATA_HOST:-https://data-api.polymarket.com}
      POLYMARKET_CLOB_HOST: ${POLYMARKET_CLOB_HOST:-https://clob.polymarket.com}
      POLYMARKET_CHAIN_ID: ${POLYMARKET_CHAIN_ID:-137}
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY:-}
      POLYMARKET_FUNDER_ADDRESS: ${POLYMARKET_FUNDER_ADDRESS:-}
      POLYMARKET_TRADER_ADDRESS: ${POLYMARKET_TRADER_ADDRESS:-}
      POLYMARKET_SIGNATURE_TYPE: ${POLYMARKET_SIGNATURE_TYPE:-0}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-before-production}
      ENGINE_POLL_INTERVAL_MS: ${ENGINE_POLL_INTERVAL_MS:-15000}
      ENGINE_ENABLE_BACKGROUND_LOOP: ${ENGINE_ENABLE_BACKGROUND_LOOP:-true}
      SYSTEM_DEFAULT_DRY_RUN: ${SYSTEM_DEFAULT_DRY_RUN:-true}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pm_trader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pm_trader"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
